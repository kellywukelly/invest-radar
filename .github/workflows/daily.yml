name: 長線佈局雷達每日更新

on:
  schedule:
    # cron 使用 UTC 時間
    - cron: '10 6 * * 1-5'    # 台北 14:10 — 台股收盤後
    - cron: '10 21 * * 1-5'   # 台北 05:10 — 美股收盤後
  workflow_dispatch:           # 允許手動觸發測試

permissions:
  contents: write              # 允許把 docs/ 與警報狀態 commit 回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行雷達
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python main.py

      - name: 發布結果
        run: |
          git config user.name "invest-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/ alert_state.json || true
          git commit -m "chore: 更新儀表板 $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')" || echo "無變更"
          git push
